# ─── PERFIL PROFESIONAL ──────────────────────────────────────────────────────
# Resumen único e impactante (estilo LinkedIn About). Alimenta la identidad del chatbot.
professional_summary: |
  Tech Lead, AI Strategist & Product Engineer (Ex-CTO) con +15 años de trayectoria transformando desafíos de negocio en arquitecturas de alto impacto. Especialista en cerrar la brecha estratégica entre la visión de producto y la ejecución técnica, asegurando que la tecnología sea un motor de escala y no un freno operativo.

  Bajo una filosofía de 'Product Engineer', priorizo entender el 'porqué' estructural antes de diseñar el 'cómo' técnico. He escalado sistemas críticos de alta disponibilidad (+1M tx/día en banca) y liderado arquitecturas de Inteligencia Artificial (LLMs, RAG, Computer Vision) bajo el enfoque 'Human-in-the-loop', optimizando el delivery y generando resultados de negocio medibles.

  Mi liderazgo técnico se centra en la excelencia operativa (Clean Code, Shift-Left Testing) y en resolver problemas complejos mediante soluciones robustas y escalables. Busco roles estratégicos donde pueda alinear la visión tecnológica con los objetivos de negocio y potenciar la autonomía de los equipos de ingeniería.

# ─── OBJETIVO DE CARRERA ─────────────────────────────────────────────────────
# Filtro activo del chatbot: qué roles acepta y cuáles descarta profesionalmente.
career_target:
  target_roles:
    - "Tech Lead / Team Lead"
    - "AI Strategist / AI Solution Architect / AI Engineer / GenAI Engineer"
    - "Engineering Manager / CTO (Startups/Mid-size)"
    - "Senior Software Engineer (Product-Focused)"
  discarded_roles:
    - "Puestos 100% Frontend (React/CSS pure)"
    - "Roles Junior o Mid-level"
    - "Posiciones sin componente de liderazgo o arquitectura"
    - "Empresas sin cultura remota (No 100% remote)"
  ideal_company_profile:
    - "Startups en fase de crecimiento (Scale-ups)"
    - "Empresas Tech-First con foco en IA o FinTech"
    - "Organizaciones que valoren la mentalidad de Product Engineer y no solo 'picar código'"

