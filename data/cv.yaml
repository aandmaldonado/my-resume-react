philosophy_and_interests:
  - title: "Filosofía de Trabajo ('Product Engineer')"
    description: "Mi concepción del software no termina en el despliegue; mi prioridad es que el código solucione eficientemente un dolor de negocio. Un buen diseño arquitectónico debe reflejar siempre una comprensión profunda del 'porqué' comercial detrás del 'cómo' técnico."

  - title: "Pasión por el Aprendizaje Continuo"
    description: "La disrupción constante requiere una formación activa. Experimento continuamente con modelos generativos en local, pruebo nuevos enfoques de integración y absorbo conocimiento técnico para asegurar que mis soluciones sigan los estándares más altos de la industria."

  - title: "Resolución de Problemas Complejos"
    description: "La ingeniería cobra sentido ante escenarios de alta incertidumbre. Encuentro una profunda satisfacción en destilar problemas monolíticos densos en arquitecturas limpias, distribuidas y lógicamente impecables, colaborando en equipos de alto rendimiento."

  - title: "Intereses Personales"
    description: "Disfruto del equilibrio que otorga la vida familiar en un entorno tranquilo (Gandía, playa/naturaleza). El deporte y los espacios al aire libre me proporcionan la perspectiva y recarga energética necesarias para liderar decisiones de arquitectura críticas con total claridad mental."