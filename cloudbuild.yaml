steps:
  # --- PASO 1: Construir la imagen (CON LA URL CORRECTA) ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --no-cache \
          --tag="$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA" \
          .
    id: Build

  # --- PASO 2: Subir la imagen (CON LA URL CORRECTA) ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA']
    id: Push
    waitFor:
      - Build

  # --- PASO 3: Desplegar la nueva imagen (CON LA URL CORRECTA) ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME' # <-- Usa la variable del servicio
      - '--image'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA' # <-- Usa la URL completa
      - '--region'
      - '$_DEPLOY_REGION' # <-- Usa la variable de la región
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'resume-frontend-sa@almapidev.iam.gserviceaccount.com'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '100'
      - '--timeout'
      - '300'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
    id: Deploy
    waitFor:
      - Push

images:
  # --- Lista la imagen (CON LA URL CORRECTA) ---
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

# --- Esta opción de logging ya la tenías y es correcta ---
options:
  logging: CLOUD_LOGGING_ONLY